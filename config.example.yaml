system:
  version: "0.4.6"

storage:
  path: ".mira"
  sqlite:
    journal_mode: WAL
    synchronous: NORMAL
    cache_size: -64000
    mmap_size: 268435456
    temp_store: MEMORY

embeddings:
  current_model: "sentence-transformers/all-MiniLM-L6-v2"
  model_hash: "a2d8f3e9"
  dimension: 384
  batch_size: 32
  cache_size: 1000

# HNSW Vector Index Configuration
# Provides O(log n) approximate nearest neighbor search
# Falls back to SQLite exact search during index building
hnsw:
  M: 32                    # Max neighbors per node (tuned for better recall, see v0.4.2)
  Ml: 0.25                 # Level generation factor (0.25 = 1/ln(M))
  ef_construction: 0       # INACTIVE — not supported by underlying hnsw library (coder/hnsw v0.4.0)
  ef_search: 100           # Size of dynamic candidate list for search (tuned, see v0.4.2)

allocator:
  default_budget: 4000
  max_candidates: 100
  early_pruning_threshold: 0.6
  session_window_seconds: 7200
  session_boost_beta: 0.2
  session_boost_max: 1.2
  causal_penalty_alpha: 0.15
  density_sigmoid:
    k: 2.0
    mu: 0.3

# Decay rates control how quickly different memory types lose relevance over time.
# Lower = slower decay (decisions last months), higher = faster decay (debug logs last days).
decay_rates:
  decision: 0.001
  fact: 0.005
  preference: 0.01
  session_note: 0.1
  debug_log: 0.5

archive_thresholds:
  session_note: 30
  debug_log: 7

overlap_cache:
  ttl_days: 30
  max_entries: 1000000

extraction:
  min_entity_length: 2
  causal_lookback: 50
  causal_max_days: 30

# =============================================================================
# RECALL CONFIGURATION
# =============================================================================
# Advanced retrieval pipeline options.
# These features expand the recall pipeline beyond pure semantic similarity.

recall:
  adaptive_threshold_method: "iqr"   # iqr | elbow | mean_stddev
  adaptive_threshold_floor: 0.15
  adaptive_threshold_ceiling: 0.75
  enable_fts5: true
  fts5_limit: 100
  rrf_k: 60
  query_expansion:
    enabled: true
    num_variants: 3
    temperature: 0.3
  search_time_clustering:
    enabled: true
    similarity_threshold: 0.88
  reranker:
    enabled: false
    top_k: 30

mcp:
  name: "mira"
  version: "0.4.6"
  transport: "stdio"
  timeout_seconds: 30

# =============================================================================
# METRICS EXPORT
# =============================================================================
# Prometheus-compatible metrics export for monitoring and alerting.
# Access metrics at http://localhost:9090/metrics

metrics:
  enabled: true            # Enable metrics collection and export
  prometheus_addr: ":9090" # Address for Prometheus scrape endpoint (":9090" = all interfaces)
  report_interval_seconds: 60  # Interval for logging metric reports

# =============================================================================
# WEBHOOK NOTIFICATIONS
# =============================================================================
# Receive HTTP callbacks when async operations complete.
# Useful for integrating with external systems and building reactive workflows.

webhooks:
  enabled: false           # Enable webhook notifications
  workers: 3               # Number of webhook delivery workers
  queue_size: 1000         # Maximum webhook event queue depth
  timeout_seconds: 30      # HTTP timeout for webhook delivery
  endpoints: []            # List of default webhook URLs (optional)
                           # Example: ["https://example.com/mira-webhook"]
  
# Webhook events include:
#   - embedding.completed : Embedding generation finished
#   - embedding.failed    : Embedding generation failed
#   - store.completed     : Full T0/T1/T2 store completed
#   - causal.detected     : New causal relationships detected
#   - index.maintenance   : Background index maintenance completed
#
# Webhook payload format:
#   {
#     "id": "uuid",
#     "type": "embedding.completed",
#     "timestamp": "2026-04-09T14:30:45Z",
#     "data": { ... event-specific data ... }
#   }
#
# Headers sent with each webhook:
#   Content-Type: application/json
#   X-Webhook-ID: <event-uuid>              (legacy, use X-MIRA-Event-ID)
#   X-Webhook-Event: <event-type>           (legacy, use X-MIRA-Event-Type)
#   X-MIRA-Event-ID: <uuid>
#   X-MIRA-Event-Type: <event-type>
#   X-MIRA-Webhook-ID: <webhook-uuid>
#   X-MIRA-Signature: sha256=...            (if secret configured)
#   X-MIRA-Signature-Version: v1            (if secret configured)

# =============================================================================
# SOUL IDENTITY EXTENSION (Optional)
# =============================================================================
# SOUL is an opt-in identity preservation layer for LLM agents.
# By default, MIRA runs without SOUL (8 tools). To enable SOUL (16 tools):
#
#   1. Set soul.enabled: true below, OR
#   2. Launch with: ./mira --config config.yaml --with-soul
#
# When enabled, SOUL shares MIRA's SQLite database and adds identity
# capture, drift detection, and model-swap preservation tools.
# See: https://github.com/benoitpetit/soul
#
# DX NOTE: Every SOUL tuning option available in standalone mode can also be
# configured directly inside MIRA's config file below. No separate SOUL config
# file or process is required for embedded mode.

soul:
  enabled: false          # Set to true to activate SOUL identity features

  # Identity extraction tuning
  extraction:
    min_trait_confidence: 0.3      # Minimum confidence for a trait to be valid
    min_observations_for_trait: 5  # Observations needed to establish a trait

  # Identity recall tuning
  recall:
    default_budget_tokens: 1000    # Token budget for generated identity prompts

  # Drift detection tuning
  drift_detection:
    threshold: 0.3                 # Drift alert threshold (0.0 - 1.0)
    window_size: 10                # Number of versions to analyse
    auto_check_after_capture: true # Check drift automatically after each capture

  # Model swap behaviour
  model_swap:
    auto_reinforce: true           # Generate reinforcement prompt after swap

  # Evolution history tuning
  evolution:
    enabled: true                  # Track identity evolution over time
    max_history_versions: 100      # Max snapshots to retain per agent
